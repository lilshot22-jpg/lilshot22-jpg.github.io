<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOW-13 | Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --neon: #00f2fe; --bg: #050505; 
            --card: rgba(255, 255, 255, 0.05);
            --text: #ffffff; --glass: rgba(25, 25, 30, 0.7);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; }
        .screen { display: none; opacity: 0; transition: opacity 0.4s; }
        .active { display: block; opacity: 1; }

        .avatar-container { margin: 20px 0; position: relative; }
        .avatar-img { width: 160px; height: 160px; object-fit: contain; image-rendering: pixelated; filter: drop-shadow(0 0 15px rgba(0, 242, 254, 0.3)); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 16px; }
        
        .timer-ui { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; width: 70px; text-align: center; }
        
        .btn { border: none; padding: 16px 20px; border-radius: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-main { background: var(--neon); color: #000; width: 100%; box-shadow: 0 4px 20px rgba(0, 242, 254, 0.3); }
        .btn-secondary { background: #333; color: white; }
        
        .shop-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .shop-card { background: var(--card); padding: 15px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
        .btn-buy { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--neon); background: transparent; color: var(--neon); font-size: 12px; }
        .btn-buy.active { background: var(--neon); color: #000; }
    </style>
</head>
<body>

    <div id="sex-screen" class="screen">
        <h1 style="margin-top: 50px;">FLOW-13</h1>
        <p style="opacity: 0.6; margin-bottom: 40px;">Выберите своего аватара</p>
        <button class="btn btn-main" style="margin-bottom: 15px;" onclick="selectSex('male')">МУЖЧИНА</button>
        <button class="btn btn-main" onclick="selectSex('female')">ЖЕНЩИНА</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="stats-grid">
            <div class="stat-card"><div>Очки</div><div id="points" style="font-size: 1.5rem; font-weight: 800; color: var(--neon);">0</div></div>
            <div class="stat-card"><div>Задачи</div><div id="tasks-count" style="font-size: 1.5rem; font-weight: 800;">0/3</div></div>
        </div>

        <div class="glass avatar-container">
            <img src="" class="avatar-img" id="avatar-img">
            <div id="mood-text" style="font-weight: 600; margin-top: 10px;">Заряжен на успех</div>
        </div>

        <div class="timer-ui" id="timer-ui">
            <input type="number" id="timer-input" value="25">
            <button class="btn btn-secondary" onclick="startTimer()">START</button>
        </div>
        <div id="timer-display" style="font-size: 2.5rem; font-weight: 800; color: var(--neon); margin-bottom: 15px; display: none;">25:00</div>

        <button class="btn btn-main" id="task-btn" onclick="doTask()">ВЫПОЛНИТЬ ЗАДАЧУ (+100)</button>

        <h3 style="text-align: left; margin: 30px 0 10px 5px; opacity: 0.7;">Гардероб</h3>
        <div class="shop-list" id="shop"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#050505');

        let state = JSON.parse(localStorage.getItem('flow13_data')) || { 
            points: 0, sex: null, avatar: 'base', owned: ['base'], tasksToday: 0, lastDate: new Date().toDateString() 
        };
        let timerEnd = null;

        const skins = {
            male: {
                base: { name: 'Базовый стиль', price: 0, sad: 'male_base_sad.gif', dance: 'male_base_dance.gif' },
                tech: { name: 'Кибер-костюм', price: 500, sad: 'male_tech_sad.gif', dance: 'male_tech_dance.gif' }
            },
            female: {
                base: { name: 'Базовый стиль', price: 0, sad: 'female_base_sad.gif', dance: 'female_base_dance.gif' },
                tech: { name: 'Кибер-костюм', price: 500, sad: 'female_tech_sad.gif', dance: 'female_tech_dance.gif' }
            }
        };

        function selectSex(s) { state.sex = s; updateUI(); }

        function checkDay() {
            const today = new Date().toDateString();
            if (state.lastDate !== today) { state.tasksToday = 0; state.lastDate = today; }
        }

        function startTimer() {
            const mins = document.getElementById('timer-input').value;
            timerEnd = Date.now() + (mins * 60 * 1000);
            document.getElementById('timer-ui').style.display = 'none';
            document.getElementById('timer-display').style.display = 'block';
            updateUI();
            
            const interval = setInterval(() => {
                const diff = timerEnd - Date.now();
                if (diff <= 0) {
                    clearInterval(interval);
                    timerEnd = null;
                    document.getElementById('timer-ui').style.display = 'flex';
                    document.getElementById('timer-display').style.display = 'none';
                    if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                    updateUI();
                } else {
                    const m = Math.floor(diff / 60000);
                    const s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                }
            }, 1000);
        }

        function updateUI() {
            checkDay();
            if (!state.sex) {
                document.getElementById('sex-screen').classList.add('active');
                return;
            }
            document.getElementById('sex-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');

            document.getElementById('points').innerText = state.points;
            document.getElementById('tasks-count').innerText = state.tasksToday + '/3';

            const skinData = skins[state.sex][state.avatar];
            document.getElementById('avatar-img').src = (state.tasksToday > 0) ? skinData.dance : skinData.sad;
            document.getElementById('mood-text').innerText = (state.tasksToday > 0) ? "В ПОТОКЕ!" : "НУЖНА ЗАДАЧА...";

            const btn = document.getElementById('task-btn');
            btn.disabled = state.tasksToday >= 3;
            btn.innerText = (timerEnd !== null) ? "ИДЕТ ТАЙМЕР..." : (state.tasksToday >= 3 ? "ЛИМИТ ИСЧЕРПАН" : "ВЫПОЛНИТЬ (+100)");

            const shopDiv = document.getElementById('shop');
            shopDiv.innerHTML = '';
            Object.entries(skins[state.sex]).forEach(([id, data]) => {
                const isActive = state.avatar === id;
                shopDiv.innerHTML += `
                    <div class="shop-card">
                        <span>${data.name}</span>
                        <button class="btn-buy ${isActive ? 'active' : ''}" onclick="buy('${id}', ${data.price})">
                            ${isActive ? 'ВЫБРАНО' : (state.owned.includes(id) ? 'ВЫБРАТЬ' : data.price)}
                        </button>
                    </div>`;
            });
            localStorage.setItem('flow13_data', JSON.stringify(state));
        }

        function doTask() {
            if (timerEnd !== null) {
                tg.showAlert("Фокус активен! Завершите таймер, чтобы сохранить продуктивность.");
                return;
            }
            if (state.tasksToday < 3) {
                state.points += 100;
                state.tasksToday++;
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                updateUI();
            }
        }

        function buy(id, price) {
            if (state.owned.includes(id)) { state.avatar = id; }
            else if (state.points >= price) { 
                state.points -= price; state.owned.push(id); state.avatar = id; 
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else { alert("Недостаточно очков!"); return; }
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
