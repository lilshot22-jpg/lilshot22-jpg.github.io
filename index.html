<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Tracker Pro & Stats</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f6fc; --text-main: #333333; --text-muted: #888888;
            --card-bg: #ffffff; --card-border: #eee; --card-border-bottom: #e0e0e0;
            --slider-track: #eef2f7; --primary: #8e44ad; --primary-shadow: #6c3483;
            --accent: #ff9f43; --btn-bg: #f0f0f0; --green: #2ecc71; --green-shadow: #27ae60;
            --advice-bg: #f9e7ff; --advice-text: #4a148c; --nav-bg: #ffffff; --chart-grid: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #131926; --text-main: #ffffff; --text-muted: #a0aab8;
            --card-bg: #202938; --card-border: #2d384c; --card-border-bottom: #1a2332;
            --slider-track: #2b364a; --primary: #a855f7; --primary-shadow: #7e22ce;
            --btn-bg: #2b364a; --advice-bg: #2e1a47; --advice-text: #f3e8ff;
            --nav-bg: #202938; --chart-grid: #374151;
        }

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; transition: background-color 0.2s, color 0.2s, border-color 0.2s; }
        
        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px 15px 90px 15px; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .streak-badge {
            background: var(--card-bg); border: 2px solid var(--card-border); border-bottom: 4px solid var(--card-border-bottom);
            padding: 8px 16px; border-radius: 20px; font-weight: 800; font-size: 18px; color: var(--accent); display: flex; align-items: center; gap: 5px;
        }

        .theme-toggle {
            background: var(--card-bg); border: 2px solid var(--card-border); border-bottom: 4px solid var(--card-border-bottom);
            padding: 10px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px;
        }
        .theme-toggle:active { border-bottom-width: 2px; transform: translateY(2px); }

        h1 { font-size: 24px; font-weight: 900; margin: 0 0 5px 0; }
        .page-subtitle { margin: 0 0 20px 0; color: var(--text-muted); font-size: 15px; font-weight: 600; }

        .page { display: none; }
        .page.active { display: block; }

        .question-card, .chart-card {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            border: 2px solid var(--card-border); border-bottom: 6px solid var(--card-border-bottom); margin-bottom: 20px; position: relative;
        }

        .question-title { font-size: 17px; font-weight: 800; margin-bottom: 5px; text-align: left; }
        .value-display { font-size: 42px; margin: 5px 0; text-align: center; }

        .slider-container { width: 100%; padding: 5px 0; }
        .custom-slider {
            -webkit-appearance: none; width: 100%; height: 14px; background: var(--slider-track); border-radius: 10px; outline: none; border: 2px solid var(--card-border);
        }
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 28px; height: 28px; border-radius: 50%; background: var(--primary);
            border: 2px solid #fff; border-bottom: 4px solid var(--primary-shadow); cursor: pointer; transform: translateY(-2px);
        }

        textarea {
            width: 100%; background: var(--slider-track); border: 2px solid var(--card-border); border-radius: 16px;
            padding: 15px; font-size: 16px; font-weight: 600; color: var(--text-main); resize: none; outline: none; height: 80px;
        }
        textarea:focus { border-color: var(--primary); background: var(--card-bg); }

        .main-btn {
            width: 100%; background: var(--primary); color: white; border: none; border-bottom: 6px solid var(--primary-shadow);
            border-radius: 20px; padding: 18px; font-size: 20px; font-weight: 900; text-transform: uppercase; margin-top: 10px; cursor: pointer;
        }
        .main-btn:active { border-bottom-width: 2px; transform: translateY(4px); }

        .advice-card {
            display: none; background: var(--advice-bg); border: 2px solid var(--primary);
            border-bottom: 6px solid var(--primary-shadow); border-radius: 24px; padding: 20px; margin-top: 25px; text-align: left;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .advice-title { font-weight: 900; font-size: 18px; color: var(--primary); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .advice-text { font-size: 15px; font-weight: 600; line-height: 1.6; color: var(--advice-text); white-space: pre-line; }

        .history-item {
            background: var(--card-bg); border-radius: 20px; padding: 15px; border: 2px solid var(--card-border);
            border-bottom: 4px solid var(--card-border-bottom); margin-bottom: 15px; text-align: left;
        }
        .history-date { font-size: 14px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; }
        .history-emojis { display: flex; gap: 10px; font-size: 22px; background: var(--slider-track); padding: 8px 12px; border-radius: 12px; width: max-content; margin-bottom: 8px;}
        .history-note { font-size: 15px; font-weight: 600; font-style: italic; opacity: 0.9; border-left: 3px solid var(--primary); padding-left: 8px; margin-top: 5px; }
        .empty-history { text-align: center; color: var(--text-muted); font-weight: 800; margin-top: 40px; }

        .navbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: var(--nav-bg); border-top: 2px solid var(--card-border);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); z-index: 1000;
        }
