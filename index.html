<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Energy Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f6fc;
            --text-main: #333333;
            --text-muted: #888888;
            --card-bg: #ffffff;
            --primary: #8e44ad;
            --primary-shadow: #6c3483;
            --accent: #ff9f43;
            --btn-bg: #f0f0f0;
            --green: #2ecc71;
            --green-shadow: #27ae60;
        }

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; transition: all 0.15s ease; }
        
        body { 
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 20px 15px; overflow-x: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .streak-badge {
            background: white; border: 2px solid #eee; border-bottom: 4px solid #eee;
            padding: 8px 16px; border-radius: 20px; font-weight: 800; font-size: 18px;
            color: var(--accent); display: flex; align-items: center; gap: 5px;
        }

        h1 { font-size: 24px; font-weight: 900; margin: 0 0 5px 0; }
        p { margin: 0 0 20px 0; color: var(--text-muted); font-size: 15px; font-weight: 600; }

        .question-card {
            background: var(--card-bg); border-radius: 24px; padding: 20px;
            border: 2px solid #eee; border-bottom: 6px solid #eee;
            margin-bottom: 20px; position: relative;
        }

        .question-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; text-align: left; }
        
        /* Эмодзи-индикатор значения */
        .value-display { font-size: 45px; margin: 10px 0; text-align: center; }

        /* Стилизация кастомного слайдера под Duolingo */
        .slider-container { width: 100%; padding: 10px 0; }
        .custom-slider {
            -webkit-appearance: none; width: 100%; height: 14px;
            background: #eef2f7; border-radius: 10px; outline: none;
            border: 2px solid #e0e0e0;
        }
        
        .custom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--primary); border: 2px solid white;
            border-bottom: 4px solid var(--primary-shadow);
            cursor: pointer; transform: translateY(-2px);
        }

        textarea {
            width: 100%; background: var(--btn-bg); border: 2px solid #eee; border-radius: 16px;
            padding: 15px; font-size: 16px; font-weight: 600; color: var(--text-main);
            resize: none; outline: none; height: 80px;
        }
        textarea:focus { border-color: var(--primary); background: white; }

        .main-btn {
            width: 100%; background: var(--primary); color: white;
            border: none; border-bottom: 6px solid var(--primary-shadow);
            border-radius: 20px; padding: 18px; font-size: 20px; font-weight: 900;
            text-transform: uppercase; margin-top: 10px; cursor: pointer;
        }
        .main-btn:active { border-bottom-width: 2px; transform: translateY(4px); }

        /* Карточка с советом (изначально скрыта) */
        .advice-card {
            display: none; background: #f9e7ff; border: 2px solid var(--primary);
            border-bottom: 6px solid var(--primary-shadow); border-radius: 24px;
            padding: 20px; margin-top: 25px; text-align: left;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .advice-title { font-weight: 900; font-size: 18px; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .advice-text { font-size: 15px; font-weight: 600; line-height: 1.5; color: #4a148c; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="streak-badge">🔥 <span id="streak-count">5</span> дней</div>
        <div style="font-weight: 800; color: #ccc;">FLOW</div>
    </div>

    <h1>Твой энерго-чек</h1>
    <p>Настрой ползунки под свое текущее состояние</p>

    <div class="question-card">
        <div class="question-title">Как ты спал сегодня?</div>
        <div class="value-display" id="sleep-emoji">😐</div>
        <div class="slider-container">
            <input type="range" min="1" max="5" value="3" class="custom-slider" id="sleep-slider" oninput="updateSlider('sleep')">
        </div>
    </div>

    <div class="question-card">
        <div class="question-title">Уровень твоей энергии?</div>
        <div class="value-display" id="energy-emoji">⚡</div>
        <div class="slider-container">
            <input type="range" min="1" max="5" value="3" class="custom-slider" id="energy-slider" oninput="updateSlider('energy')">
        </div>
    </div>

    <div class="question-card">
        <div class="question-title">Что повлияло на состояние?</div>
        <textarea id="note-input" placeholder="Кофе, плохой сон, крутые новости..."></textarea>
    </div>

    <button class="main-btn" id="save-btn" onclick="generateAnalysis()">АНАЛИЗИРОВАТЬ СОСТОЯНИЕ</button>

    <div class="advice-card" id="advice-block">
        <div class="advice-title">💡 Совет от FLOW на сегодня:</div>
        <div class="advice-text" id="advice-content">Загрузка анализа...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();
        tg.setHeaderColor('#f3f6fc');

        // Массивы эмодзи для плавного изменения на 5 шагов
        const sleepEmojis = { 1: "😫", 2: "🙁", 3: "😐", 4: "🙂", 5: "🤩" };
        const energyEmojis = { 1: "🪫", 2: "🔋", 3: "⚡", 4: "🔥", 5: "🚀" };

        function updateSlider(type) {
            const slider = document.getElementById(`${type}-slider`);
            const emojiDisplay = document.getElementById(`${type}-emoji`);
            const value = slider.value;

            // Меняем эмодзи на лету
            if (type === 'sleep') emojiDisplay.innerText = sleepEmojis[value];
            if (type === 'energy') emojiDisplay.innerText = energyEmojis[value];

            // Лёгкий виброотклик при перетаскивании по делениям
            if (tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        }

        function generateAnalysis() {
            const sleepVal = parseInt(document.getElementById('sleep-slider').value);
            const energyVal = parseInt(document.getElementById('energy-slider').value);
            
            const adviceBlock = document.getElementById('advice-block');
            const adviceContent = document.getElementById('advice-content');
            const saveBtn = document.getElementById('save-btn');

            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

            let advice = "";

            // Матрица умных персональных советов
            if (sleepVal <= 2 && energyVal <= 2) {
                advice = "Бро, ты на грани выгорания. Полное истощение. Твоя главная задача на сегодня — режим энергосбережения. Отложи сложные задачи, отмени несрочные встречи и ложись спать на 2 часа раньше обычного. Никакого кофе после обеда, он сделает только хуже.";
            } else if (sleepVal <= 2 && energyVal >= 4) {
                advice = "Энергия так прет, но помни — это кредит под дикие проценты у твоего сна. Ты работаешь на адреналине. Чтобы завтра не накрыл мощный откат, проведи день активно, но вечером строго за 1 час до сна убери телефон и прими теплый душ, чтобы разгрузить нервную систему.";
            } else if (sleepVal >= 4 && energyVal <= 2) {
                advice = "Парадокс: сон отличный, а сил нет. Скорее всего, мозг застоялся или организму не хватает кислорода. Не пытайся разогнать себя энергетиками. Лучшее решение сегодня — легкая прогулка на 20 минут в обед и банальное проветривание комнаты. Добавь немного физического движения.";
            } else if (sleepVal >= 4 && energyVal >= 4) {
                advice = "Режим Бога активирован! Идеальный баланс восстановления и сил. Сегодня тот самый день, когда нужно закрывать самые висящие и сложные задачи (лягушек). Хватай этот фокус и жги, пока батарейка на максимуме!";
            } else {
                advice = "Ты в хорошем, стабильном рабочем состоянии. Баланс соблюден. Чтобы удержать эту планку до вечера и подняться еще выше, делай микро-перерывы каждые 45 минут работы и не забывай пить чистую воду.";
            }

            // Выводим блок с анимацией
            adviceContent.innerText = advice;
            adviceBlock.style.display = 'block';

            // Перекрашиваем кнопку в стиль "Готово"
            saveBtn.innerText = "ДАННЫЕ ОБНОВЛЕНЫ";
            saveBtn.style.background = "var(--green)";
            saveBtn.style.borderBottomColor = "var(--green-shadow)";

            // Плавно скроллим экран вниз к совету
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
