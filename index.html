<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FLOW-13</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0c; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        .stats { background: #151518; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .avatar-zone { font-size: 80px; margin: 10px 0; }
        .task-btn { width: 100%; padding: 15px; background: #00f2fe; color: #000; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; margin-bottom: 20px; }
        .task-btn:disabled { background: #333; color: #888; }
        .shop-item { background: #1f1f23; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .buy-btn { background: #7000ff; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stats">
        <div>Очки: <span id="points">0</span> | Задач сегодня: <span id="tasks-count">0</span>/3</div>
    </div>

    <div class="avatar-zone" id="avatar">👤</div>

    <button class="task-btn" id="task-btn" onclick="doTask()">ВЫПОЛНИТЬ ЗАДАЧУ (+100)</button>

    <h3 style="text-align: left;">Апгрейд Личности</h3>
    <div id="shop"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let state = JSON.parse(localStorage.getItem('flow13_data')) || { 
            points: 0, 
            avatar: '👤', 
            owned: ['👤'], 
            tasksToday: 0, 
            lastDate: new Date().toDateString() 
        };

        function checkDayReset() {
            const today = new Date().toDateString();
            if (state.lastDate !== today) {
                state.tasksToday = 0;
                state.lastDate = today;
            }
        }

        function updateUI() {
            checkDayReset();
            document.getElementById('points').innerText = state.points;
            document.getElementById('tasks-count').innerText = state.tasksToday;
            document.getElementById('avatar').innerText = state.avatar;
            
            const btn = document.getElementById('task-btn');
            if (state.tasksToday >= 3) {
                btn.disabled = true;
                btn.innerText = "ЛИМИТ НА СЕГОДНЯ ИСЧЕРПАН";
            } else {
                btn.disabled = false;
                btn.innerText = "ВЫПОЛНИТЬ ЗАДАЧУ (+100)";
            }

            const shopDiv = document.getElementById('shop');
            shopDiv.innerHTML = '';
            const shopItems = [
                { id: '👤', name: 'Стандарт', price: 0 },
                { id: '🤖', name: 'Киборг', price: 500 },
                { id: '🥷', name: 'Тень', price: 1200 },
                { id: '🤵', name: 'Магнат', price: 2500 }
            ];

            shopItems.forEach((item, index) => {
                const isOwned = state.owned.includes(item.id);
                shopDiv.innerHTML += `
                    <div class="shop-item">
                        <span>${item.id} ${item.name}</span>
                        <button class="buy-btn" onclick="buySkin(${index}, ${item.price}, '${item.id}')">
                            ${isOwned ? 'Надеть' : item.price}
                        </button>
                    </div>
                `;
            });
            localStorage.setItem('flow13_data', JSON.stringify(state));
        }

        function doTask() {
            if (state.tasksToday < 3) {
                state.points += 100;
                state.tasksToday++;
                if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                updateUI();
            }
        }

        function buySkin(index, price, id) {
            if (state.owned.includes(id)) {
                state.avatar = id;
            } else if (state.points >= price) {
                state.points -= price;
                state.owned.push(id);
                state.avatar = id;
            } else {
                alert("Недостаточно очков!");
            }
            updateUI();
        }

        updateUI();
    </script>
</body>
</html>
