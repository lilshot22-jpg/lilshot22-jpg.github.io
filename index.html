            --slider-track: #eef2f7; --primary: #8e44ad; --primary-shadow: #6c3483;
            --accent: #ff9f43; --btn-bg: #f0f0f0; --green: #2ecc71; --green-shadow: #27ae60;

        body { background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px 15px 90px 15px; overflow-x: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        
        .streak-badge {

            padding: 8px 16px; border-radius: 20px; font-weight: 800; font-size: 18px; color: var(--accent); display: flex; align-items: center; gap: 5px;
        }

        .theme-toggle {
            background: var(--card-bg); border: 2px solid var(--card-border); border-bottom: 4px solid var(--card-border-bottom);
            padding: 10px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px;
        }
        .theme-toggle:active { border-bottom-width: 2px; transform: translateY(2px); }
