<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Яндекс.Кальян Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Базовая тема - ТЕМНАЯ (Ночная) по умолчанию */
        :root {
            --bg-main: #141414;
            --bg-card: #212121;
            --bg-tabs: #1c1c1c;
            --text-main: #FFFFFF;
            --text-secondary: #8E8E93;
            --border-color: #2C2C2E;
            --accent-color: #FCE000; /* Фирменный желтый Яндекса */
            --accent-text: #000000;
            --radius-main: 16px;
            --radius-button: 12px;
        }

        /* Класс для СВЕТЛОЙ (Дневной) темы при переключении */
        body.day-theme {
            --bg-main: #F6F6F6;
            --bg-card: #FFFFFF;
            --bg-tabs: #EAEAEA;
            --text-main: #000000;
            --text-secondary: #7F7F7F;
            --border-color: #E0E0E0;
            --accent-color: #FCE000;
            --accent-text: #000000;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            padding-bottom: 110px;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Шапка с кнопкой переключения режимов */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-secondary);
            margin: 0;
        }

        /* Переключатель День/Ночь */
        .theme-toggle {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        /* Сегментированный переключатель Зал / VIP */
        .tabs {
            display: flex;
            background: var(--bg-tabs);
            padding: 3px;
            border-radius: var(--radius-button);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            color: var(--text-secondary);
            border: none;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            border-radius: calc(var(--radius-button) - 2px);
